  <rect x="12" y="28" width="32" height="6" rx="1" fill="#ff1a1a" opacity="0.7"/>
  <rect x="12" y="38" width="36" height="6" rx="1" fill="#ff1a1a" opacity="0.85"/>
  
  <!-- RD text -->
