# Example nginx vhost for THE REDACTED PROTOCOL.
# Place at /etc/nginx/sites-available/redacted, symlink to sites-enabled, reload.
#
#   api.redacted.xyz  → backend (5000)
#   redacted.xyz      → dashboard (3000)
#
# TLS via certbot --nginx. Replace domain names as needed.

# ── Backend: HTTP API + WebSocket ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.redacted.xyz;

    # Redirect to HTTPS (uncomment once certbot runs)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout                  300s;
    }

    # Socket.io long-polling/ws path
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout          86400s;
    }
}

# ── Dashboard ──────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name redacted.xyz www.redacted.xyz;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }
}
