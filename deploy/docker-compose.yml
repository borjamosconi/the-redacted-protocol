version: '3.9'

# Full-stack compose for THE REDACTED PROTOCOL launchpad.
# Brings up: MongoDB + rdx-backend (pumpfun-backend port) + rdx-dashboard (Next.js) + nginx
# reverse proxy. Run from repo root:  docker compose -f deploy/docker-compose.yml up -d

services:
  mongo:
    image: mongo:7
    container_name: rdx-mongo
    restart: unless-stopped
    volumes:
      - rdx-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: redacted

  rdx-backend:
    build:
      context: ../pumpfun-backend
      dockerfile: Dockerfile
    container_name: rdx-backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ../pumpfun-backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/redacted
      PORT: 5000
    ports:
      - "5000:5000"

  rdx-dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: rdx-dashboard
    restart: unless-stopped
    depends_on:
      - rdx-backend
    env_file:
      - ../dashboard/.env.local
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://rdx-backend:5000
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: rdx-nginx
    restart: unless-stopped
    depends_on:
      - rdx-backend
      - rdx-dashboard
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  rdx-mongo-data:
