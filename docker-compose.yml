version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redacted-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  rd-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redacted-protocol-agent
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - rd-data:/app/data
      - rd-logs:/app/logs
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  rd-data:
  rd-logs:
  redis-data:
